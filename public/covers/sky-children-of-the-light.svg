<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="70%" stop-color="rgba(0,0,0,0.4)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Decorative pattern -->
  <g>
    <circle cx="350" cy="40" r="60" fill="#6EE7B7" opacity="0.08"/>
    <circle cx="50" cy="260" r="40" fill="#6EE7B7" opacity="0.06"/>
  </g>

  <!-- Genre-specific icon -->
  <g><path d="M175,110 L195,110 L195,100 Q200,95 205,100 L205,110 L225,110 L225,130 L215,130 Q210,135 215,140 L225,140 L225,160 L175,160 L175,140 L185,140 Q190,135 185,130 L175,130 Z" fill="none" stroke="#6EE7B7" stroke-width="2" opacity="0.3"/></g>

  <!-- Dark overlay for text readability -->
  <rect width="400" height="300" fill="url(#overlay)"/>

  <!-- Genre tag -->
  <rect x="16" y="16" rx="10" ry="10" width="118" height="24" fill="#6EE7B7" opacity="0.25"/>
  <text x="26" y="33" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="white" opacity="0.9">益智 · 模拟</text>

  <!-- Platform icons -->
  <text x="384" y="33" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" opacity="0.7" text-anchor="end">📱 🎮</text>

  <!-- Rating badge -->
  <rect x="16" y="46" rx="8" ry="8" width="45" height="20" fill="rgba(255,255,255,0.15)"/>
  <text x="38" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="white" opacity="0.85" text-anchor="middle">⭐ 8.8</text>

  <!-- Game name (Chinese) -->
  <text x="20" y="248" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="white">光·遇</text>

  <!-- Game name (English) -->
  <text x="20" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" opacity="0.65">Sky: Children of the Light</text>

  <!-- Price tag -->
  <text x="384" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6EE7B7" opacity="0.8" text-anchor="end">免费</text>
</svg>