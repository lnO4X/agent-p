<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="70%" stop-color="rgba(0,0,0,0.4)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Decorative pattern -->
  <g>
    <circle cx="350" cy="40" r="60" fill="#C4B5FD" opacity="0.08"/>
    <circle cx="50" cy="260" r="40" fill="#C4B5FD" opacity="0.06"/>
  </g>

  <!-- Genre-specific icon -->
  <g><polygon points="200,85 235,115 222,155 178,155 165,115" fill="none" stroke="#C4B5FD" stroke-width="2" opacity="0.3"/>
      <polygon points="200,100 220,118 213,143 187,143 180,118" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.2"/></g>

  <!-- Dark overlay for text readability -->
  <rect width="400" height="300" fill="url(#overlay)"/>

  <!-- Genre tag -->
  <rect x="16" y="16" rx="10" ry="10" width="76" height="24" fill="#C4B5FD" opacity="0.25"/>
  <text x="26" y="33" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="white" opacity="0.9">MOBA</text>

  <!-- Platform icons -->
  <text x="384" y="33" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" opacity="0.7" text-anchor="end">💻</text>

  <!-- Rating badge -->
  <rect x="16" y="46" rx="8" ry="8" width="45" height="20" fill="rgba(255,255,255,0.15)"/>
  <text x="38" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="white" opacity="0.85" text-anchor="middle">⭐ 8.5</text>

  <!-- Game name (Chinese) -->
  <text x="20" y="248" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="white">英雄联盟</text>

  <!-- Game name (English) -->
  <text x="20" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" opacity="0.65">League of Legends</text>

  <!-- Price tag -->
  <text x="384" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#C4B5FD" opacity="0.8" text-anchor="end">免费</text>
</svg>