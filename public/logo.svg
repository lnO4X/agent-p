<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <rect id="bg" width="512" height="512" rx="80" ry="80"/>
  </defs>

  <!-- Background: dark with subtle border -->
  <rect width="512" height="512" rx="80" ry="80" fill="#111111"/>
  <rect x="8" y="8" width="496" height="496" rx="72" ry="72" fill="none" stroke="#d97706" stroke-width="3" opacity="0.5"/>

  <!-- "GT" text -->
  <text x="256" y="290" text-anchor="middle" font-family="system-ui, -apple-system, Arial, sans-serif" font-weight="800" font-size="220" fill="url(#gold)">GT</text>

  <!-- "GameTan" text below -->
  <text x="256" y="390" text-anchor="middle" font-family="system-ui, -apple-system, Arial, sans-serif" font-weight="600" font-size="60" fill="url(#gold)" opacity="0.85">GameTan</text>
</svg>
