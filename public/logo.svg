<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0c0818"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <!-- iOS-style rounded rect background -->
  <rect width="512" height="512" rx="114" ry="114" fill="url(#bg)"/>

  <!-- Centered "GT" -->
  <text x="256" y="296" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="200" fill="url(#text)" letter-spacing="-8">GT</text>
</svg>
