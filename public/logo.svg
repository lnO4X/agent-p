<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background: dark rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0f0a1a"/>

  <!-- Outer glow border -->
  <rect x="6" y="6" width="500" height="500" rx="90" ry="90" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.4"/>

  <!-- Hexagon frame (gaming/esports symbol) -->
  <polygon points="256,80 400,160 400,352 256,432 112,352 112,160" fill="none" stroke="url(#g1)" stroke-width="4" opacity="0.25"/>

  <!-- Inner hexagon -->
  <polygon points="256,120 370,185 370,327 256,392 142,327 142,185" fill="none" stroke="url(#g2)" stroke-width="1.5" opacity="0.15"/>

  <!-- Crosshair — precision/gaming symbol -->
  <circle cx="256" cy="240" r="60" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.35"/>
  <circle cx="256" cy="240" r="8" fill="url(#g1)"/>
  <line x1="256" y1="160" x2="256" y2="210" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="270" x2="256" y2="320" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="176" y1="240" x2="226" y2="240" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="286" y1="240" x2="336" y2="240" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- "GT" bold letters inside crosshair -->
  <text x="256" y="258" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-weight="900" font-size="72" fill="url(#g2)" letter-spacing="-2">GT</text>

  <!-- "GAMETAN" text below -->
  <text x="256" y="410" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="42" fill="url(#g2)" letter-spacing="8" opacity="0.9">GAMETAN</text>

  <!-- Accent dots (energy/data points) -->
  <circle cx="152" cy="140" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="360" cy="140" r="3" fill="#06b6d4" opacity="0.5"/>
  <circle cx="152" cy="370" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="360" cy="370" r="3" fill="#7c3aed" opacity="0.4"/>
</svg>
